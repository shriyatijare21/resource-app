<!DOCTYPE html>
<html>
<head>
    <!-- Title shown in browser tab -->
    <title> Study Resource Sharing</title>

    <style>
        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* Main container */
        .container {
            width: 500px;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        /* Headings */
        h2 {
            text-align: center;
        }

        h3 {
            margin-top: 20px;
        }

        /* Input fields */
        input {
            width: 95%;
            padding: 8px;
            margin: 5px 0;
        }

        /* Buttons */
        button {
            padding: 10px;
            width: 100%;
            background-color: green;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Resource list */
        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- App Title -->
    <h2> Study Resource Sharing</h2>

    <!-- Add Resource Form -->
    <h3>Add Resource</h3>

    <!-- Input fields -->
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="description" placeholder="Description">
    <input type="text" id="link" placeholder="Link (https://...)">
    <input type="text" id="subject" placeholder="Subject">

    <!-- Button to add resource -->
    <button onclick="addResource()">Add Resource</button>

    <!-- Section to display resources -->
    <h3>All Resources</h3>

    <!-- Button to load data -->
    <button onclick="getResources()">Load Resources</button>

    <!-- List where data will be shown -->
    <ul id="list"></ul>

</div>

<script>

// Show error message
function showError(msg) {
    alert(msg);
}

// Show success message
function showSuccess(msg) {
    alert(msg);
}

//  ADD RESOURCE FUNCTION
function addResource() {

    // Get values from input fields
    let title = document.getElementById("title").value.trim();
    let description = document.getElementById("description").value.trim();
    let link = document.getElementById("link").value.trim();
    let subject = document.getElementById("subject").value.trim();

    //  Frontend validation
    if (!title || !description || !link || !subject) {
        alert("All fields are required!");
        return;
    }

    // Check link format
    if (!link.startsWith("http")) {
        alert("Link must start with http or https");
        return;
    }

    // Send POST request to backend
    fetch("/resources", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        // Convert data to JSON
        body: JSON.stringify({ title, description, link, subject })
    })

    // Handle response
    .then(res => {
        if (!res.ok) {
            // If error → show backend error
            return res.json().then(err => {
                throw err;
            });
        }
        return res.json();
    })

    // On success
    .then(() => {
        alert("Resource Added Successfully!");
        getResources(); // reload list
    })

    // On error
    .catch(err => {
        alert("Error: " + JSON.stringify(err));
    });
}


//  GET ALL RESOURCES
function getResources() {

    fetch("/resources")
    .then(res => res.json())

    .then(data => {

        let list = document.getElementById("list");

        // Clear old list
        list.innerHTML = "";

        // Loop through all resources
        data.forEach(r => {

            let item = document.createElement("li");

            // Add title, subject, description
            item.innerHTML =
                "<b>" + r.title + "</b>" +
                "<br>" + r.subject +
                "<br>" + r.description;

            // Add link
            if (r.link) {
                item.innerHTML +=
                    "<br><a href='" + r.link + "' target='_blank'>Open Resource</a>";
            }

            // Add delete button
            item.innerHTML +=
                "<br><button onclick='deleteResource(" + r.id + ")'>Delete</button>";

            // Add item to list
            list.appendChild(item);
        });
    })

    .catch(() => {
        showError("Failed to load resources");
    });
}


// ❌ DELETE RESOURCE
function deleteResource(id) {

    fetch("/resources/" + id, {
        method: "DELETE"
    })

    .then(() => {
        alert("Deleted successfully!");
        getResources(); // reload list
    });
}

</script>
</body>
</html>
