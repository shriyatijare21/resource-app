<!DOCTYPE html>
<html>
<head>
    <title>Study Resource Sharing</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 500px;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        h3 {
            margin-top: 20px;
            color: #444;
        }

        input {
            width: 95%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            border-left: 5px solid #4CAF50;
        }

        .small-text {
            font-size: 12px;
            color: gray;
            display: block;
            margin-top: 5px;
        }

        .link {
            display: inline-block;
            margin-top: 6px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            word-break: break-all;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Study Resource Sharing</h2>

    <h3>Add Resource</h3>

    <input type="text" id="title" placeholder="Title">
    <input type="text" id="description" placeholder="Description">
    <input type="text" id="link" placeholder="Link (https://...)">
    <input type="text" id="subject" placeholder="Subject">

    <button onclick="addResource()">Add Resource</button>

    <h3>All Resources</h3>
    <button onclick="getResources()">Load Resources</button>

    <ul id="list"></ul>

</div>

<script>

function showError(msg) {
    alert(" " + msg);
}

function showSuccess(msg) {
    alert(" " + msg);
}

// ✅ VALIDATION BEFORE SENDING REQUEST
function addResource() {

    let title = document.getElementById("title").value.trim();
    let description = document.getElementById("description").value.trim();
    let link = document.getElementById("link").value.trim();
    let subject = document.getElementById("subject").value.trim();

    // ✅ Frontend validation
    if (!title || !description || !link || !subject) {
        alert("All fields are required!");
        return;
    }

    if (!link.startsWith("http")) {
        alert("Link must start with http or https");
        return;
    }

    fetch("/resources", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, description, link, subject })
    })
    .then(res => {
        if (!res.ok) {
            return res.json().then(err => {
                throw err;
            });
        }
        return res.json();
    })
    .then(() => {
        alert("Resource Added Successfully!");
        getResources();
    })
    .catch(err => {
        console.log(err);
        alert("Error: " + JSON.stringify(err));
    });
}

function getResources() {
    fetch("/resources")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

		data.forEach(r => {
		    let item = document.createElement("li");

		    item.innerHTML =
		        "<b>" + r.title + "</b>" +
		        "<span class='small-text'>" + r.subject + "</span>" +
		        "<span class='small-text'>" + r.description + "</span>";

		    // Link
		    if (r.link) {
		        item.innerHTML +=
		            "<br><a class='link' href='" + r.link + "' target='_blank'>Open Resource</a>";
		    }

		    // ✅ DELETE BUTTON
		    item.innerHTML +=
		        "<br><button onclick='deleteResource(" + r.id + ")' style='background:red;margin-top:8px;'>Delete</button>";

		    list.appendChild(item);
		});
		
    })
    .catch(() => {
        showError("Failed to load resources from server");
    });
}
function deleteResource(id) {
    fetch("/resources/" + id, {
        method: "DELETE"
    })
    .then(() => {
        alert("Deleted successfully!");
        getResources(); // refresh list
    });
}

</script>
</body>
</html>
